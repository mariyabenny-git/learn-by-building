<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Project Tasks | Mariya Benny</title>
    <style>
        :root { 
            --bg: #0b111a; --card: #161b22; --border: #30363d; 
            --text: #c9d1d9; --accent: #58a6ff; --green: #2ea043; 
            --yellow: #d29922; --disabled: #8b949e;
        }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 40px; }
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 60px; }
        .logo { color: var(--accent); font-family: monospace; font-weight: bold; }
        .submit-trigger { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        h1 { font-size: 3rem; margin: 10px 0; }
        .subtitle { color: var(--disabled); max-width: 600px; line-height: 1.5; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 40px; }
        .tab-group { background: #0d1117; border: 1px solid var(--border); padding: 5px; border-radius: 12px; display: flex; gap: 5px; }
        .tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; color: var(--disabled); font-size: 0.9rem; border: none; background: none; transition: 0.2s; }
        .tab.active { background: #21262d; color: white; border: 1px solid var(--border); }
        .tab.green { color: #3fb950; }
        .sub-tabs { display: flex; gap: 10px; min-height: 40px; flex-wrap: wrap; justify-content: center; }
        .sub-tab { border: 1px solid var(--border); padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; background: transparent; color: var(--disabled); }
        .sub-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(88, 166, 255, 0.05); }
        .task-card { background: var(--card); max-width: 850px; margin: 30px auto; border-radius: 12px; border: 1px solid var(--border); padding: 40px; }
        .code-block { background: #010409; border-radius: 8px; padding: 20px; font-family: monospace; font-size: 0.9rem; color: #7ee787; margin-top: 15px; border: 1px solid var(--border); white-space: pre; overflow-x: auto; }
        .section-label { font-size: 0.7rem; letter-spacing: 1px; color: var(--accent); font-weight: bold; margin-top: 25px; display: block; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 12px; width: 440px; }
        .modal input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; margin: 10px 0; box-sizing: border-box; }
        .modal-badge { display: inline-block; background: rgba(88, 166, 255, 0.1); color: var(--accent); padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; border: 1px solid var(--accent); margin: 15px 0; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--accent); font-size: 0.8rem; padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid #1c2128; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo">// learn by building</div>
        <button class="submit-trigger" onclick="toggleModal(true)">Submit Project</button>
    </header>

    <h1>Web Project Tasks</h1>
    <p class="subtitle">Complete the challenges to climb the leaderboard. Every commit counts toward your engineering streak.</p>

    <div class="controls">
        <div class="tab-group" id="main-tabs">
            <button class="tab" id="tab-leaderboard" onclick="switchView('leaderboard')">Leaderboard</button>
            <button class="tab active green" id="tab-beginner" onclick="switchView('beginner')">Beginner</button>
            <button class="tab" id="tab-intermediate" onclick="switchView('intermediate')">Intermediate <small style="opacity:0.5">soon</small></button>
            <button class="tab" id="tab-advanced" onclick="switchView('advanced')">Advanced <small style="opacity:0.5">soon</small></button>
        </div>
        <div class="sub-tabs" id="sub-tabs-container"></div>
    </div>

    <div id="tasks-container">
        <div class="task-card">
            <h2 id="task-title">Student Portfolio</h2>
            <p id="task-desc">Loading project details...</p>
            <div id="dynamic-details">
                <span class="section-label">FOLDER STRUCTURE</span>
                <div class="code-block" id="task-folder"></div>
            </div>
        </div>
    </div>

    <div id="leaderboard-container" class="hidden">
        <div class="task-card" style="max-width: 900px;">
            <h3>Top Contributors</h3>
            <table>
                <thead>
                    <tr><th>Rank</th><th>Name</th><th>Project</th><th>Score</th><th>Commits</th></tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- Dynamic data will load here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0;">Submit Project</h3>
                <span onclick="toggleModal(false)" style="cursor:pointer; color:var(--disabled);">&times;</span>
            </div>
            <div id="modal-badge" class="modal-badge">Student Portfolio</div>
            <input type="text" id="repo-url" placeholder="GitHub Repository URL">
            <button class="submit-trigger" style="width:100%; background:#38618a;" onclick="submitProject()">Submit for Validation</button>
        </div>
    </div>

    <script>
        // CENTRAL DATA: Add new projects here to update EVERYTHING
        const database = {
            beginner: {
                portfolio: { title: "Student Portfolio", desc: "Build a JSON-powered resume page.", folder: "📁 student-portfolio/\n├── index.html\n├── profile.json" },
                recipe: { title: "Recipe Book", desc: "Create a searchable food database.", folder: "📁 recipe-book/\n├── index.html\n├── recipes.json" },
                quiz: { title: "Quiz App", desc: "An interactive multiple-choice engine.", folder: "📁 quiz-app/\n├── index.html\n├── questions.json" }
            },
            intermediate: {}, advanced: {}
        };

        let currentMode = 'beginner';

        function switchView(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active', 'green'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            if(mode === 'beginner') document.getElementById(`tab-${mode}`).classList.add('green');

            const isLB = mode === 'leaderboard';
            document.getElementById('tasks-container').classList.toggle('hidden', isLB);
            document.getElementById('leaderboard-container').classList.toggle('hidden', !isLB);

            renderSubTabs(mode);
        }

        function renderSubTabs(mode) {
            const container = document.getElementById('sub-tabs-container');
            container.innerHTML = '';
            
            const projects = database[mode] || {};
            const keys = Object.keys(projects);

            if (keys.length > 0) {
                keys.forEach((key, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `sub-tab ${idx === 0 ? 'active' : ''}`;
                    btn.innerText = projects[key].title;
                    btn.onclick = () => loadProject(mode, key);
                    container.appendChild(btn);
                });
                loadProject(mode, keys[0]);
            } else if (mode !== 'leaderboard') {
                document.getElementById('task-title').innerText = "Coming Soon";
                document.getElementById('task-desc').innerText = "Working on new engineering challenges.";
                document.getElementById('dynamic-details').classList.add('hidden');
            }
        }

        function loadProject(mode, key) {
            const p = database[mode][key];
            document.getElementById('task-title').innerText = p.title;
            document.getElementById('task-desc').innerText = p.desc;
            document.getElementById('task-folder').innerText = p.folder;
            document.getElementById('dynamic-details').classList.remove('hidden');
            document.querySelectorAll('.sub-tab').forEach(b => b.classList.toggle('active', b.innerText === p.title));
        }

        function toggleModal(show) {
            const m = document.getElementById('modal');
            if(show) {
                document.getElementById('modal-badge').innerText = document.getElementById('task-title').innerText;
                m.style.display = 'flex';
            } else { m.style.display = 'none'; }
        }

        // Initialize
        switchView('beginner');
    </script>
</body>
</html>
